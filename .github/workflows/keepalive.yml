name: Keep Render App Alive

on:
  schedule:
    - cron: "*/14 * * * *" # Runs every 14 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Shooper Spectrum
        run: |
          echo "Pinging Shooper Spectrum to keep it awake..."
          curl -s https://shooper-spectrum.onrender.com/ > /dev/null
          echo "Ping complete."
